<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Ingressos App{% endblock %}</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f3f4f6;
            color: #111827;
        }

        header {
            background: #111827;
            color: white;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        header a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        header a:hover {
            text-decoration: underline;
        }

        main {
            max-width: 1050px;
            margin: 32px auto;
            padding: 0 16px;
        }

        h1, h2, h3 {
            margin-top: 0;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 16px;
            border-radius: 10px;
            box-shadow: 0 1px 5px rgba(0, 0, 0, 0.10);
        }

        .card-destaque {
            border-left: 6px solid #2563eb;
        }

        .btn {
            display: inline-block;
            background: #2563eb;
            color: white;
            padding: 10px 14px;
            border-radius: 6px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        .btn-secundario {
            background: #4b5563;
        }

        .btn-secundario:hover {
            background: #374151;
        }

        .btn-perigo {
            background: #dc2626;
        }

        .btn-perigo:hover {
            background: #b91c1c;
        }

        .muted {
            color: #6b7280;
        }

        .mensagem {
            padding: 14px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            background: #dbeafe;
            color: #1e3a8a;
            font-weight: bold;
        }

        .status {
            display: inline-block;
            padding: 5px 9px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: bold;
        }

        .status-confirmada {
            background: #dcfce7;
            color: #166534;
        }

        .status-cancelada {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-pendente {
            background: #fef3c7;
            color: #92400e;
        }

        .grid-filmes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
        }

        .grid-assentos {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 8px;
            margin-top: 20px;
        }

        .assento {
            text-align: center;
            padding: 10px 0;
            border-radius: 6px;
            font-weight: bold;
        }

        .disponivel {
            background: #dcfce7;
            color: #166534;
        }

        .reservado {
            background: #fef3c7;
            color: #92400e;
        }

        .vendido {
            background: #fee2e2;
            color: #991b1b;
        }

        .form-assentos {
            margin-top: 20px;
        }

        .assento-checkbox {
            cursor: pointer;
        }

        .assento-checkbox input {
            display: none;
        }

        .assento-checkbox span {
            display: block;
            text-align: center;
            padding: 10px 0;
            border-radius: 6px;
            font-weight: bold;
            border: 2px solid transparent;
        }

        .assento-checkbox input:checked + span {
            border-color: #2563eb;
            background: #bfdbfe;
            color: #1e3a8a;
        }

        .assento-indisponivel {
            opacity: 0.65;
        }

        .acoes {
            margin-top: 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        input,
        select {
            padding: 8px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            min-width: 260px;
        }

        label {
            font-weight: bold;
        }

        a {
            color: #2563eb;
        }

        .linha {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .linha > * {
            flex: 1;
            min-width: 220px;
        }
    </style>
</head>
<body>
<header>
    <a href="/">Ingressos App</a>

    <a href="{% url 'minhas_reservas' %}">Minhas reservas</a>
    <a href="{% url 'minhas_compras' %}">Minhas compras</a>

    {% if request.user.is_authenticated %}
        <span>Olá, {{ request.user.username }}</span>
        <a href="{% url 'logout_front' %}">Sair</a>
    {% else %}
        <a href="{% url 'login_front' %}">Entrar</a>
        <a href="{% url 'cadastro_front' %}">Criar conta</a>
    {% endif %}
</header>

<main>
    {% if messages %}
        {% for message in messages %}
            <div class="mensagem">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</main>
</body>
</html>
