<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Ingressos App{% endblock %}</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f5f5;
            color: #222;
        }

        header {
            background: #111827;
            color: white;
            padding: 16px 32px;
        }

        header a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        main {
            max-width: 1000px;
            margin: 32px auto;
            padding: 0 16px;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 16px;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
        }

        .btn {
            display: inline-block;
            background: #2563eb;
            color: white;
            padding: 10px 14px;
            border-radius: 6px;
            text-decoration: none;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        .muted {
            color: #666;
        }

        .grid-assentos {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 8px;
            margin-top: 20px;
        }

        .assento {
            text-align: center;
            padding: 10px 0;
            border-radius: 6px;
            font-weight: bold;
        }

        .disponivel {
            background: #dcfce7;
            color: #166534;
        }

        .reservado {
            background: #fef3c7;
            color: #92400e;
        }

        .vendido {
            background: #fee2e2;
            color: #991b1b;
        }

        .form-assentos {
            margin-top: 20px;
        }

        .assento-checkbox {
            cursor: pointer;
        }

        .assento-checkbox input {
            display: none;
        }

        .assento-checkbox span {
            display: block;
            text-align: center;
            padding: 10px 0;
            border-radius: 6px;
            font-weight: bold;
            border: 2px solid transparent;
        }

        .assento-checkbox input:checked + span {
            border-color: #2563eb;
            background: #bfdbfe;
            color: #1e3a8a;
        }

        .assento-indisponivel {
            opacity: 0.65;
        }

        .acoes {
            margin-top: 24px;
        }

    </style>
</head>
<body>
<header>
    <a href="/">Ingressos App</a>

    <span style="margin-left: 24px;">
        <a href="{% url 'minhas_compras' %}">Minhas compras</a>
    </span>

    {% if request.user.is_authenticated %}
        <span style="margin-left: 24px;">
            Olá, {{ request.user.username }}
        </span>
    {% else %}
        <span style="margin-left: 24px;">
            <a href="/admin/login/">Entrar</a>
        </span>
    {% endif %}
</header>

<main>
    {% if messages %}
        {% for message in messages %}
            <div class="card">
                <strong>{{ message }}</strong>
            </div>
        {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</main>
</body>
</html>
